name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [ main, master, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-bundle
      run: cargo install cargo-bundle

    - name: Build app bundle
      run: |
        cd crates/editor
        cargo bundle --release

    - name: Create DMG
      run: |
        mkdir -p build
        
        BUILD_DIR="build/AsterIDE"
        rm -rf "$BUILD_DIR"
        mkdir -p "$BUILD_DIR"
        
        cp -r "target/release/bundle/osx/AsterIDE.app" "$BUILD_DIR/"
        
        ln -s /Applications "$BUILD_DIR/Applications"
        
        hdiutil create -volname "AsterIDE" -srcfolder "$BUILD_DIR" -ov -format UDZO "build/AsterIDE.dmg"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AsterIDE-macos
        path: build/AsterIDE.dmg

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: build/AsterIDE.dmg
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
